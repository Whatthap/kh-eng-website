{% extends 'base.html' %} {% block content %}
<div
  class="mx-auto max-w-2xl rounded-3xl border border-slate-200 bg-white p-8 shadow-sm"
>
  <h1 class="text-2xl font-semibold text-slate-900">
    Create a teacher account
  </h1>
  <p class="mt-2 text-sm text-slate-600">
    Register with your email and password so your progress can be saved
    securely.
  </p>
  <form method="post" class="mt-6 space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700"
        >Full name</label
      >
      <input
        name="name"
        class="w-full rounded-xl border border-slate-300 px-3 py-2"
        required
      />
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700">Email</label>
      <input
        name="email"
        type="email"
        class="w-full rounded-xl border border-slate-300 px-3 py-2"
        required
      />
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700"
        >Password</label
      >
      <input
        name="password"
        type="password"
        class="w-full rounded-xl border border-slate-300 px-3 py-2"
        required
      />
    </div>
    {% if error %}
    <p class="text-sm text-rose-600">{{ error }}</p>
    {% endif %}
    <button
      class="w-full rounded-xl bg-indigo-600 px-4 py-2 font-semibold text-white"
    >
      Register
    </button>
  </form>
</div>
{% endblock %}
