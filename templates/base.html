<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Learning Portal</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  </head>
  <body
    class="min-h-screen bg-[linear-gradient(135deg,#f8fafc_0%,#eef2ff_100%)] text-slate-800"
  >
    <nav class="border-b border-slate-200 bg-white/80 backdrop-blur">
      <div
        class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3"
      >
        <a href="/" class="text-lg font-semibold text-indigo-700"
          >English–Khmer Teacher Portal</a
        >
        <div class="flex items-center gap-2">
          {% if session.get('teacher_id') %}
          <a
            href="/dashboard"
            class="rounded-full bg-indigo-600 px-3 py-1.5 text-sm font-medium text-white"
            >Dashboard</a
          >
          <a
            href="/logout"
            class="rounded-full border border-slate-300 px-3 py-1.5 text-sm"
            >Logout</a
          >
          {% else %}
          <a
            href="/login"
            class="rounded-full bg-indigo-600 px-3 py-1.5 text-sm font-medium text-white"
            >Login</a
          >
          <a
            href="/register"
            class="rounded-full border border-slate-300 px-3 py-1.5 text-sm"
            >Register</a
          >
          {% endif %}
        </div>
      </div>
    </nav>
    <main class="mx-auto max-w-6xl px-4 py-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
