services:
  - type: web
    name: kh-eng-website
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OWNER_EMAIL
        value: whatthap@gmail.com
      - key: DATABASE_URL
        fromDatabase:
          name: kh-eng-db
          property: connectionString

databases:
  - name: kh-eng-db
