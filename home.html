<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English–Khmer Teacher Language Exchange</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen">
    <header class="sticky top-0 z-50 shadow-md px-4 py-3">
      <div
        class="max-w-5xl mx-auto flex items-center justify-between flex-wrap gap-2"
      >
        <h1 class="heading-font text-lg md:text-xl text-white">
          English–Khmer Teacher Language Exchange
        </h1>
        <div class="flex items-center gap-2">
          <select
            id="day-select"
            class="rounded-lg border border-white/30 bg-white/20 text-white px-3 py-1.5 text-sm font-medium backdrop-blur"
          ></select>
        </div>
      </div>
      <div class="max-w-5xl mx-auto mt-2">
        <div class="h-2 bg-white/20 rounded-full overflow-hidden">
          <div
            id="progress-bar"
            class="progress-fill h-full bg-yellow-300 rounded-full"
            style="width: 0%"
          ></div>
        </div>
      </div>
    </header>
    <div class="max-w-5xl mx-auto px-4 pt-4 md:px-8">
      <div
        class="rounded-2xl border border-indigo-100 bg-white/90 p-4 shadow-sm backdrop-blur"
      >
        <label for="vocab-search" class="text-sm font-semibold text-gray-700"
          >Search vocabulary</label
        >
        <input
          id="vocab-search"
          type="text"
          placeholder="Try: hello, teacher, thank you..."
          class="mt-2 w-full rounded-xl border border-gray-200 px-3 py-2 text-sm shadow-sm focus:border-indigo-400 focus:outline-none"
        />
        <div id="search-results" class="mt-3 space-y-2"></div>
      </div>
    </div>
    <main id="slides-container" class="max-w-5xl mx-auto p-4 md:p-8"></main>
    <nav
      class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur border-t border-gray-200 py-3 px-4 z-50"
    >
      <div class="max-w-5xl mx-auto flex justify-between items-center">
        <button
          id="prev-btn"
          class="flex items-center gap-1 px-4 py-2 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed"
        >
          <i data-lucide="chevron-left" style="width: 18px; height: 18px"></i>
          Previous
        </button>
        <span
          id="slide-counter"
          class="text-sm font-medium text-gray-600"
        ></span>
        <button
          id="next-btn"
          class="flex items-center gap-1 px-4 py-2 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed"
        >
          Next
          <i data-lucide="chevron-right" style="width: 18px; height: 18px"></i>
        </button>
      </div>
    </nav>
    <div class="h-20"></div>
    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
