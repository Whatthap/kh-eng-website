<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English–Khmer Teacher Language Exchange</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen">
    <button
      id="theme-toggle"
      class="fixed right-4 top-4 z-[60] rounded-full border border-white/20 bg-white/80 p-2 text-indigo-700 shadow-lg backdrop-blur"
      aria-label="Toggle dark mode"
    >
      <i data-lucide="moon" style="width: 18px; height: 18px"></i>
    </button>
    <button
      id="back-to-top"
      class="fixed bottom-24 right-4 z-[60] hidden rounded-full bg-indigo-600 p-3 text-white shadow-lg"
      aria-label="Back to top"
    >
      <i data-lucide="arrow-up" style="width: 18px; height: 18px"></i>
    </button>
    <header class="sticky top-0 z-50 bg-indigo-700 px-4 py-3 shadow-md">
      <div
        class="max-w-5xl mx-auto flex items-center justify-between flex-wrap gap-2"
      >
        <h1 class="heading-font text-lg md:text-xl text-white">
          English–Khmer Teacher Language Exchange
        </h1>
        <div class="flex items-center gap-2">
          <span
            id="account-status"
            class="rounded-full bg-white/20 px-3 py-1 text-sm text-white/90"
            >Guest</span
          >
          <button
            id="account-btn"
            class="rounded-full border border-white/30 bg-white/20 px-3 py-1.5 text-sm font-medium text-white backdrop-blur hover:bg-white/30"
          >
            Teacher Account
          </button>
        </div>
      </div>
      <div class="max-w-5xl mx-auto mt-2">
        <div class="h-2 overflow-hidden rounded-full bg-white/20">
          <div
            id="progress-bar"
            class="progress-fill h-full rounded-full bg-yellow-300"
            style="width: 0%"
          ></div>
        </div>
      </div>
    </header>
    <div class="max-w-5xl mx-auto px-4 pt-4 md:px-8">
      <div
        class="rounded-2xl border border-indigo-100 bg-white/90 p-4 shadow-sm backdrop-blur"
      >
        <div class="mb-3 flex items-center justify-between">
          <p class="text-sm font-semibold text-gray-700">Progress</p>
          <span id="lesson-progress-label" class="text-xs text-gray-400"
            >Start lesson</span
          >
        </div>
        <div
          class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between"
        >
          <div>
            <p class="text-sm font-semibold text-gray-700">Search vocabulary</p>
            <p class="text-xs text-gray-400">
              Find phrases quickly without scrolling through every lesson.
            </p>
          </div>
          <input
            id="vocab-search"
            type="text"
            placeholder="Try: hello, teacher, thank you..."
            class="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm shadow-sm focus:border-indigo-400 focus:outline-none md:max-w-sm"
          />
        </div>
        <div id="search-results" class="mt-3 space-y-2"></div>
      </div>
    </div>
    <main id="slides-container" class="max-w-5xl mx-auto p-4 md:p-8"></main>
    <nav
      class="fixed bottom-0 left-0 right-0 border-t border-gray-200 bg-white/95 py-3 px-4 shadow-[0_-4px_16px_rgba(0,0,0,0.08)] backdrop-blur z-50"
    >
      <div class="max-w-5xl mx-auto flex justify-between items-center">
        <button
          id="prev-btn"
          class="flex items-center gap-1 px-4 py-2 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed"
        >
          <i data-lucide="chevron-left" style="width: 18px; height: 18px"></i>
          Previous
        </button>
        <span
          id="slide-counter"
          class="text-sm font-medium text-gray-600"
        ></span>
        <button
          id="next-btn"
          class="flex items-center gap-1 px-4 py-2 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed"
        >
          Next
          <i data-lucide="chevron-right" style="width: 18px; height: 18px"></i>
        </button>
      </div>
    </nav>
    <div class="h-20"></div>
    <div
      id="account-modal"
      class="fixed inset-0 z-[80] hidden items-center justify-center bg-slate-900/60 p-4"
    >
      <div
        class="w-full max-w-3xl rounded-3xl border border-indigo-100 bg-white p-5 shadow-2xl"
      >
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-sm font-semibold text-indigo-600">Teacher portal</p>
            <h2 class="text-xl font-bold text-gray-900">
              Sign in or create your account
            </h2>
          </div>
          <button
            id="close-account-modal"
            class="rounded-full bg-gray-100 px-3 py-1 text-lg text-gray-600"
            aria-label="Close account panel"
          >
            ×
          </button>
        </div>
        <div class="mt-4 grid gap-4 lg:grid-cols-[1.1fr_0.9fr]">
          <div class="rounded-2xl bg-indigo-50 p-4">
            <form id="account-form" class="space-y-3">
              <div>
                <label
                  for="account-name"
                  class="mb-1 block text-sm font-medium text-gray-700"
                  >Your name</label
                >
                <input
                  id="account-name"
                  type="text"
                  class="w-full rounded-xl border border-indigo-200 px-3 py-2 text-sm focus:border-indigo-400 focus:outline-none"
                  placeholder="Teacher name"
                />
              </div>
              <div>
                <label
                  for="account-email"
                  class="mb-1 block text-sm font-medium text-gray-700"
                  >Email address</label
                >
                <input
                  id="account-email"
                  type="email"
                  required
                  class="w-full rounded-xl border border-indigo-200 px-3 py-2 text-sm focus:border-indigo-400 focus:outline-none"
                  placeholder="teacher@email.com"
                />
              </div>
              <button
                type="submit"
                class="w-full rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700"
              >
                Save account
              </button>
              <p id="account-message" class="text-sm text-indigo-700"></p>
            </form>
          </div>
          <div class="rounded-2xl border border-gray-200 p-4">
            <div id="account-dashboard" class="space-y-3"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
